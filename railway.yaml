# Railway deployment configuration for Hack United Sponsorship Outreach Backend
# This file defines how Railway should deploy the Python backend

# Build configuration
build:
  builder: python
  buildCommand: pip install -r requirements.txt

# Deploy configuration
deploy:
  startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
  healthcheckPath: /health
  healthcheckTimeout: 300
  restartPolicyType: ON_FAILURE
  restartPolicyMaxRetries: 10

# Environment variables (set these in Railway dashboard)
# GROQ_API_KEY
# GOOGLE_SHEETS_SPREADSHEET_ID
# GMAIL_USERNAME
# GMAIL_APP_PASSWORD
# GOOGLE_SHEETS_CREDENTIALS_PATH
# LOG_LEVEL

# Cron job configuration (runs daily at 9 AM EST)
cron:
  - schedule: "0 9 * * *"
    command: python backend/main.py
