[build]
  # Build command for the frontend (no build needed for static HTML)
  command = "echo 'No build step required'"

  # Directory to publish
  publish = "frontend"

  # Use Python 3.11 which has prebuilt wheels
  environment = { PYTHON_VERSION = "3.11" }

# No Netlify functions used in Railway-native architecture.
# Frontend talks directly to Railway backend, configured in frontend/app.js.

[[headers]]
  # Security headers for all routes
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  # Cache static assets
  for = "/frontend/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Environment variables (set in Netlify dashboard)
# GOOGLE_SHEETS_CREDENTIALS_PATH
# GOOGLE_SHEETS_SPREADSHEET_ID
# GMAIL_USERNAME
# GMAIL_APP_PASSWORD